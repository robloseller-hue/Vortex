<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="100" height="100" rx="22" fill="url(#glow)" opacity="0.15"/>
  <!-- Z letter - bold, modern -->
  <text x="50" y="72" 
    font-family="Inter, Arial, sans-serif" 
    font-size="62" 
    font-weight="800" 
    text-anchor="middle" 
    fill="white"
    letter-spacing="-2">Z</text>
  <!-- Small dot accent bottom right -->
  <circle cx="75" cy="76" r="5" fill="#a5b4fc" opacity="0.9"/>
</svg>
